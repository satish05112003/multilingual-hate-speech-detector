<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicGuard AI</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 480px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      color: #e0e0e8;
      overflow-x: hidden;
    }

    /* ── Header ───────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }

    /* ── Status Bar ────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }

    .status-text {
      color: #94a3b8;
      flex: 1;
    }

    /* ── Input Section ─────────────────────────────────── */
    .input-section {
      padding: 16px;
    }

    .input-label {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .text-input {
      width: 100%;
      height: 100px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #e0e0e8;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
    }

    .text-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .text-input::placeholder {
      color: #475569;
    }

    .analyze-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }

    .analyze-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .analyze-btn:active {
      transform: translateY(0);
    }

    .analyze-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .analyze-btn.loading {
      pointer-events: none;
    }

    .analyze-btn.loading::after {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      margin-left: 8px;
      vertical-align: middle;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Results Section ───────────────────────────────── */
    .results-section {
      padding: 0 16px 16px;
      display: none;
    }

    .results-section.visible {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    /* Label Badge */
    .label-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .label-badge.hate {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .label-badge.offensive {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .label-badge.neutral {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .label-badge .badge-icon {
      font-size: 14px;
    }

    /* Metrics */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      padding: 10px;
    }

    .metric-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 18px;
      font-weight: 700;
      margin-top: 2px;
    }

    .metric-value.high { color: #22c55e; }
    .metric-value.medium { color: #f59e0b; }
    .metric-value.low { color: #ef4444; }

    /* Confidence Bar */
    .confidence-bar-wrapper {
      margin-top: 14px;
    }

    .confidence-bar-label {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .confidence-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .confidence-fill.hate { background: linear-gradient(90deg, #ef4444, #dc2626); }
    .confidence-fill.offensive { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .confidence-fill.neutral { background: linear-gradient(90deg, #22c55e, #16a34a); }

    /* Explanation */
    .explanation {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(99, 102, 241, 0.06);
      border-left: 3px solid #6366f1;
      border-radius: 0 8px 8px 0;
      font-size: 12px;
      color: #a5b4fc;
      line-height: 1.5;
    }

    /* Probabilities */
    .probabilities {
      margin-top: 14px;
    }

    .prob-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .prob-label {
      width: 70px;
      color: #94a3b8;
      text-transform: capitalize;
    }

    .prob-bar-wrapper {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .prob-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .prob-value {
      width: 40px;
      text-align: right;
      color: #94a3b8;
      font-size: 11px;
    }

    /* ── Toggle Section ────────────────────────────────── */
    .toggle-section {
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .toggle-label {
      font-size: 12px;
      color: #94a3b8;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle input:checked + .toggle-slider {
      background: #6366f1;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    /* ── Footer ────────────────────────────────────────── */
    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      color: #334155;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
    }

    /* ── Error ─────────────────────────────────────────── */
    .error-msg {
      padding: 10px;
      margin: 0 16px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      color: #ef4444;
      font-size: 12px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <h1>Multilingual Hate Speech Detector</h1>
    </div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-label">Analyze Text</div>
    <textarea
      class="text-input"
      id="textInput"
      placeholder="Paste or type text to analyze for hate speech...&#10;Supports: English, Hindi, Telugu, Bengali, Code-mixed"
    ></textarea>
    <button class="analyze-btn" id="analyzeBtn">
      Analyze
    </button>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="result-card">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 10px 0;">
        <div class="label-badge" id="labelBadge" style="margin: 0;">
          <span class="badge-icon" id="badgeIcon"></span>
          <span id="labelText"></span>
        </div>
        <div style="font-size: 14px; color: #94a3b8; font-weight: 600;">
          Confidence: <span id="confidenceValue" style="color: #e0e0e8; font-weight: 700;">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Toggles -->
  <div class="toggle-section">
    <div class="toggle-row">
      <span class="toggle-label">Blur Hate & Offensive Content</span>
      <label class="toggle">
        <input type="checkbox" id="blurToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Auto-scan page content</span>
      <label class="toggle">
        <input type="checkbox" id="autoScan" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Show inline badges</span>
      <label class="toggle">
        <input type="checkbox" id="showBadges" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Footer removed -->

  <script src="popup.js"></script>
</body>
</html>
